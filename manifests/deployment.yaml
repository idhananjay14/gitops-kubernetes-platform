apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow
  template:
    metadata:
      labels:
        app: taskflow
    spec:
      containers:
      - name: taskflow
        image: taskflow:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
